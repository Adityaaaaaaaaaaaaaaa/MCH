name: my_cooking_helper
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  flutter_riverpod: ^2.6.1
  flutter_launcher_icons: ^0.14.4
  go_router: ^16.0.0
  google_sign_in: ^7.1.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  shared_preferences: ^2.5.3
  salomon_bottom_bar: ^3.3.2
  flutter_spinkit: ^5.2.1
  alert_info: ^0.0.3
  animate_do: ^4.2.0
  flutter_slidable: ^4.0.0
  camera: ^0.11.1
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  http: ^1.4.0
  glass: ^2.0.0+2
  hive: ^2.2.3
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  flutter_screenutil: ^5.9.3
  step_progress_indicator: ^1.0.2
  lottie: ^3.3.1
  liquid_pull_to_refresh: ^3.0.1
  animated_emoji: ^3.2.1
  flutter_dotenv: ^6.0.0
  webview_flutter: ^4.13.0
  flutter_widget_from_html: ^0.17.0
  youtube_player_iframe: ^5.2.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  crypto: ^3.0.6
  flutter_displaymode: ^0.6.0
  add_2_calendar: ^3.0.1
  flutter_local_notifications: ^19.4.1
  timezone: ^0.10.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/app_icon.png"

# assets
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/animations/
    - assets/animated_emojis/
    - assets/images/
    - assets/images/onboarding/
    - assets/images/loginSignup/
    - assets/images/home/
    - assets/images/smartScan/
    - assets/images/smartScan/scanFood/
    - assets/images/smartScan/scanReceipt/
    - assets/images/settings/

